name: blind_nav_app
description: 智能盲人辅助导航系统 - Android App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 地图 - 使用 flutter_map + OpenStreetMap（免 API Key，开箱即用）
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # 相机
  image_picker: ^1.0.7
  # 网络请求
  http: ^1.2.0
  dio: ^5.4.0
  # 本地存储
  shared_preferences: ^2.2.2
  # 语音播报
  flutter_tts: ^3.8.5
  # 日期选择
  intl: ^0.19.0
  # 状态管理
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
